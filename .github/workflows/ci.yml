name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo and cache dependencies
        uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: HTML validation
        run: npx html-validate "**/*.html"

      - name: CSS lint
        run: npx stylelint "**/*.css"

      - name: JS lint
        run: npx eslint "**/*.js"

      - name: Dead link check
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const glob = require('glob');
            let failed = false;
            const files = glob.sync('**/*.html', { ignore: ['node_modules/**'] });
            files.forEach(file => {
              const lines = fs.readFileSync(file, 'utf8').split('\n');
              lines.forEach((line, i) => {
                if (/href=\"#\"/.test(line)) {
                  console.error(\`ERROR: href=\"#\" found in \${file}:\${i + 1}: \${line.trim()}\`);
                  failed = true;
                }
                if (/<form[^>]*action=\"\"/.test(line) || /<form(?![^>]*action)/.test(line)) {
                  console.error(\`ERROR: form with empty or missing action in \${file}:\${i + 1}: \${line.trim()}\`);
                  failed = true;
                }
              });
            });
            if (failed) process.exit(1);
          "

      - name: npm security audit
        run: npm audit --audit-level=high

      - name: Image size audit
        run: node scripts/check-images.js

      - name: SEO files check
        run: node scripts/check-seo-files.js

      - name: Playwright E2E tests
        run: npx playwright test
        env:
          BASE_URL: https://playcentralgames.com

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Lighthouse CI
        if: github.event_name == 'pull_request'
        run: npx lhci autorun
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url || 'https://playcentralgames.com' }}
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
