html,body{

  color:var(--text);

  width:100%;

.warren-pair{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;}
.warren-row{

  border-radius:8px;padding:.28rem .32rem;
  border:2px solid transparent;position:relative;
  transition:border-color .3s,background .3s;overflow:hidden;
}
.warren-row.bonded{border-color:rgba(255,215,0,.6);}

@keyframes glowPulse{
  0%,100%{box-shadow:0 0 5px 2px rgba(255,215,0,.2);}
  50%    {box-shadow:0 0 18px 7px rgba(255,215,0,.65);}
}
.warren-row.three-glow{
  animation:glowPulse 1.8s ease-in-out infinite;
  border-color:rgba(255,215,0,.55)!important;
}
.warren-row-label{
  font-size:.52rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.06em;opacity:.7;
  display:flex;align-items:center;gap:.28rem;
}
.bonded-label-tag{
  font-size:.48rem;font-weight:800;
  color:rgba(255,215,0,.9);
  background:rgba(255,215,0,.12);
  border:1px solid rgba(255,215,0,.3);
  border-radius:20px;padding:.05rem .32rem;
  letter-spacing:.03em;text-transform:uppercase;
  white-space:nowrap;
}
.warren-slots{display:flex;gap:.22rem;align-items:center;}
.warren-bond-divider{width:1px;height:80%;background:rgba(255,255,255,.15);flex-shrink:0;margin:0 .1rem;}
.warren-bond-divider--ai{width:1px;height:80%;background:rgba(255,255,255,.15);flex-shrink:0;margin:0 .08rem;}

/* ── Player card slots ──────────────────────────── */
.ws-card{width:40px;height:56px;border-radius:5px;object-fit:contain;display:block;transition:transform .18s;flex-shrink:0;}
.ws-card:hover{transform:scale(1.07);}
.ws-empty{width:40px;height:56px;border-radius:5px;flex-shrink:0;}
.ws-bond-slot{width:34px;height:48px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ws-bond-slot img{width:100%;height:100%;object-fit:contain;border-radius:4px;filter:drop-shadow(0 2px 5px rgba(0,0,0,.55));}

/* ── AI card slots (smaller) ────────────────────── */
.ws-card--ai{width:28px;height:39px;border-radius:4px;object-fit:contain;display:block;transition:transform .18s;flex-shrink:0;}
.ws-card--ai:hover{transform:scale(1.07);}
.ws-empty--ai{width:28px;height:39px;border-radius:4px;flex-shrink:0;}
.ws-bond-slot--ai{width:24px;height:33px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ws-bond-slot--ai img{width:100%;height:100%;object-fit:contain;border-radius:3px;filter:drop-shadow(0 1px 4px rgba(0,0,0,.5));}

/* ── Player warren: 4 vertical columns ─────────── */
.warren-area--player{margin-bottom:.45rem;}
.warren-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;}
.warren-col{
  display:flex;flex-direction:column;align-items:center;gap:0;
  border-radius:8px;padding:.3rem .25rem .35rem;
  border:2px solid transparent;position:relative;

.warren-col.bonded{border-color:rgba(255,215,0,.6);}
.warren-col.three-glow{animation:glowPulse 1.8s ease-in-out infinite;border-color:rgba(255,215,0,.55)!important;}
.warren-col-label{font-size:.52rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;opacity:.7;margin-bottom:.18rem;}

.wc-bond-slot{width:100%;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:.18rem .15rem;min-height:22px;margin-bottom:.14rem;}

.wc-bond-slot.bonded-slot span{font-size:.42rem;font-weight:800;color:rgba(255,215,0,.95);text-align:center;line-height:1.25;letter-spacing:.02em;text-transform:uppercase;}

.wc-card + .wc-card + .wc-card{z-index:3;}
.wc-card + .wc-card + .wc-card + .wc-card{z-index:4;}

.one-more{font-size:.5rem;color:rgba(255,215,0,.95);font-weight:800;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.6);margin-top:.1rem;display:block;text-align:center;}

.drawn-card-area{display:flex;flex-direction:column;align-items:center;gap:.35rem;flex:1;}

.drawn-card-label-bar{width:100%;text-align:center;font-size:.48rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:.18rem .25rem;flex-shrink:0;}

@keyframes drawGlow {

  0%  {background:rgba(255,255,255,.0);}

.drawn-card-empty{

.game-message{text-align:center;color:rgba(255,255,255,.82);font-size:.74rem;font-weight:700;padding:.25rem;}

.actions-area{display:flex;flex-direction:column;gap:.4rem;align-items:stretch;flex-shrink:0;width:130px;}
.game-btn{background:var(--amber);color:#fff;border:none;border-radius:8px;padding:.48rem .9rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;cursor:pointer;transition:background .15s,transform .1s;text-align:center;}

.game-btn:disabled{opacity:.38;cursor:not-allowed;}
.game-btn.sec{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);}
.game-btn.sec:hover:not(:disabled){background:rgba(255,255,255,.24);}
.game-btn.go{background:#2a8a2a;}
.game-btn.go:hover:not(:disabled){background:#38aa38;}
.color-picker{display:flex;gap:.38rem;flex-wrap:wrap;justify-content:center;}
.cpick-label{font-size:.65rem;color:rgba(255,255,255,.55);text-align:center;margin-bottom:.15rem;}
.color-btn{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.35);cursor:pointer;font-size:.8rem;font-weight:800;transition:transform .15s,border-color .15s;color:#fff;display:flex;align-items:center;justify-content:center;}

.ai-thinking-txt{font-size:.72rem;color:rgba(255,255,255,.45);text-align:center;animation:pulse 1.2s ease-in-out infinite;}

.game-log{background:rgba(0,0,0,.22);border-radius:8px;padding:.65rem .8rem;max-height:90px;overflow-y:auto;margin-top:.6rem;}
.log-entry{font-size:.72rem;color:rgba(255,255,255,.65);padding:.12rem 0;border-bottom:1px solid rgba(255,255,255,.05);}

.win-banner{background:rgba(0,0,0,.82);border-radius:18px;padding:2.2rem;text-align:center;color:#fff;margin-bottom:1rem;}
.win-banner h3{font-family:'Fredoka One',cursive;font-size:2.1rem;margin-bottom:.4rem;}
.win-banner p{opacity:.78;margin-bottom:1.4rem;}

/* ── Responsive ─────────────────────────────────── */
@media(max-width:640px){
  .game-middle{flex-wrap:wrap;}
  .actions-area{width:100%;}
}
</style>

let _ctx = null;
let _bgPlaying = false;
let _bgTimeout = null;

function ac() {
  if(!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if(_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}
function tone(freq, type, start, dur, vol, freqEnd) {
  const ctx = ac();
  const osc = ctx.createOscillator();
  const g   = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, start);
  if(freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, start + dur);
  g.gain.setValueAtTime(0.001, start);
  g.gain.linearRampToValueAtTime(vol, start + 0.015);
  g.gain.exponentialRampToValueAtTime(0.001, start + dur);

  osc.stop(start + dur + 0.05);
}
function noiseBurst(start, dur, vol, cutoff) {
  const ctx = ac();
  const len = Math.ceil(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  let last = 0;
  for(let i = 0; i < len; i++) {
    const white = Math.random() * 2 - 1;
    last = (last + 0.02 * white) / 1.02;
    d[i] = last * 18;
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type = 'lowpass'; filt.frequency.value = cutoff;
  const g = ctx.createGain();
  g.gain.setValueAtTime(vol, start);
  g.gain.exponentialRampToValueAtTime(0.001, start + dur);
  src.connect(filt); filt.connect(g); g.connect(ctx.destination);
  src.start(start); src.stop(start + dur + 0.05);

const _BG_NOTES = [261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25,783.99,880.00];
const _BG_PAT = [2,3,4,5,4,3,2,1,2,3,5,6,5,4,3,2,3,4,5,7,6,5,4,3,2,1,2,3,4,3,2,0];
let _bgIdx = 0;
const _BG_STEP = 340;
function startBgMelody() {
  if(_bgPlaying) return;

  const ctx = ac();

  _bgGain.gain.setValueAtTime(0.001, ctx.currentTime);
  _bgGain.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 3.0);

function _tickBg() {
  if(!_bgPlaying || !_bgGain) return;

  const freq = _BG_NOTES[_BG_PAT[_bgIdx % _BG_PAT.length]];
  const t = ctx.currentTime;

  const osc2 = ctx.createOscillator();

  osc2.type = 'triangle'; osc2.frequency.value = freq;
  env.gain.setValueAtTime(0.001, t);
  env.gain.linearRampToValueAtTime(1.0, t + 0.018);
  env.gain.exponentialRampToValueAtTime(0.001, t + dur);

  osc1.start(t); osc1.stop(t + dur + 0.05);
  osc2.start(t); osc2.stop(t + dur + 0.05);
  _bgIdx++;
  _bgTimeout = setTimeout(_tickBb, _BG_STEP);
}
function _tickBb() { _tickBg(); }
function stopBgMelody(immediate) {
  _bgPlaying = false;
  if(_bgTimeout) { clearTimeout(_bgTimeout); _bgTimeout = null; }

    const ctx = ac();

    _bgGain.gain.cancelScheduledValues(ctx.currentTime);
    _bgGain.gain.setValueAtTime(_bgGain.gain.value, ctx.currentTime);
    _bgGain.gain.linearRampToValueAtTime(0.001, ctx.currentTime + fadeTime);
    const g = _bgGain; _bgGain = null;
    setTimeout(() => { try { g.disconnect(); } catch(e){} }, (fadeTime + 0.2) * 1000);
  }
}

// ╔══════════════════════════════════════╗
// ║   BUNNY WARREN — DIGITAL GAME v3.0  ║
// ╚══════════════════════════════════════╝

const COLORS = ['red','blue','green','orange'];
const CM = {
  red:    { name:'Red',    hex:'#d44040', light:'#fde8e8', prefix:'RB' },
  blue:   { name:'Blue',   hex:'#5a60c0', light:'#e8eeff', prefix:'PB' },
  green:  { name:'Green',  hex:'#3a9a3a', light:'#e8fde8', prefix:'GB' },
  orange: { name:'Orange', hex:'#e07830', light:'#fff3e8', prefix:'OB' },
};
const ANIMALS = [
  {name:'Horse',   img:'HORSE.png'  },
  {name:'Pig',     img:'PIG.png'    },
  {name:'Sheep',   img:'SHEEP.png'  },
  {name:'Alpaca',  img:'ALPACA.png' },
  {name:'Chicken', img:'CHICKEN.png'},
  {name:'Cow',     img:'COW.png'    },
];

let G = null;
let _gameNumber = 0; // 🔵 GA: track session game count

function buildDeck() {
  const d = [];
  COLORS.forEach(c => { for(let i=1;i<=4;i++) d.push({type:'bunny', color:c, variant:i}); });
  for(let i=0;i<8;i++) d.push({type:'carrot'});
  for(let i=0;i<4;i++) d.push({type:'bond'});
  d.push({type:'fox'});
  ANIMALS.forEach(a => { for(let i=0;i<4;i++) d.push({type:'animal',name:a.name,img:a.img}); });
  return shuffle(d);
}
function shuffle(a) {
  const r=[...a];
  for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}
  return r;
}
function mkPlayer() {
  return {
    bunnies: {red:0,blue:0,green:0,orange:0},
    bonds:   {red:false,blue:false,green:false,orange:false},
    variants:{red:[],blue:[],green:[],orange:[]},
    carrot:  false,
    bond:    0,
  };
}

function startGame() {
  stopBgMelody();
  _melodyStarted = false;
  _gameNumber++;
  G = {
    deck: buildDeck(),
    discard: [],
    player: mkPlayer(),
    ai: mkPlayer(),
    turn: 'player',
    phase: 'waiting',
    drawn: null,
    pending: null,
    winner: null,
    log: ['🐰 Your turn! Click the deck or Draw button to start.'],
    _turnsPlayer: 0, // 🔵 GA: count player turns
  };

  // 🔵 GA: game started
  gaEvent('game_start', {
    game_number: _gameNumber,
    is_replay: _gameNumber > 1
  });

  render();
}

function popCard() {
  if(G.deck.length===0) {
    G.deck=shuffle([...G.discard]);
    G.discard=[];
    addLog('♻️ Deck reshuffled!');
  }
  return G.deck.pop();
}
function addLog(m) { G.log.unshift(m); if(G.log.length>8) G.log.pop(); }
function discardCard(c) { G.discard.push(c||{type:'used'}); }
function eligibleBondGroups() {
  return COLORS.filter(c => G.player.bunnies[c]>=2 && !G.player.bonds[c]);
}

function flashAndDraw(el) {
  if(G.phase!=='waiting'||G.turn!=='player') return;
  if(!_melodyStarted){ _melodyStarted=true; startBgMelody(); }
  el.classList.add('flash');
  el.style.pointerEvents='none';
  setTimeout(playerDraw, 120);
}
function deckTap() {
  if(G.phase!=='waiting'||G.turn!=='player') return;
  if(!_melodyStarted){ _melodyStarted=true; startBgMelody(); }
  const slot = document.getElementById('draw-empty-slot');
  if(slot) { slot.classList.add('flash'); slot.style.pointerEvents='none'; }
  setTimeout(playerDraw, 120);
}

function playerDraw() {
  if(G.phase!=='waiting'||G.turn!=='player') return;
  G._turnsPlayer++;
  const card = popCard();
  G.drawn = card;

  // 🔵 GA: first ever draw = real engagement
  if(G._turnsPlayer === 1) {
    gaEvent('first_draw', { game_number: _gameNumber });
  }

  if(card.type==='animal') {
    discardCard(card);
    sfxAnimal();
    addLog(`🐾 Drew a ${card.name} — discarded. End of turn.`);
    G.phase='auto'; render(); setTimeout(endPlayerTurn,1600);
    return;
  }
  if(G.player.carrot && card.type!=='carrot') {
    G.pending = card;
    G.phase = 'sc_prompt';
    addLog(`Drew a ${cardName(card)}! You have a saved 🥕 — use it first?`);
    render(); return;
  }
  if(G.player.bond>0 && eligibleBondGroups().length>0 && card.type!=='bond') {
    G.pending = card;
    G.phase = 'sb_prompt';
    addLog(`Drew a ${cardName(card)}! You have a saved 💕 Bond — use it first?`);
    render(); return;
  }
  resolveDrawn(card);
}

function cardName(card) {
  if(card.type==='bunny') return `${CM[card.color].name} Bunny`;
  if(card.type==='carrot') return 'Carrot';
  if(card.type==='bond') return 'Bunny Bond';
  if(card.type==='fox') return 'Fox';
  return card.name||'?';
}
function afterCarrotCheck(originalCard) {
  if(!originalCard) { G.phase='auto'; render(); setTimeout(endPlayerTurn,1400); return; }
  if(G.player.bond>0 && eligibleBondGroups().length>0 && originalCard.type!=='bond') {
    G.pending = originalCard;
    G.phase = 'sb_prompt';
    addLog(`You have a saved 💕 Bond — use it before resolving the ${cardName(originalCard)}?`);
    render();
  } else {
    resolvePending(originalCard);
  }
}
function resolveDrawn(card) {
  G.drawn = card;
  if(card.type==='bunny')  { doPlayerBunny(card.color, card.variant); }
  else if(card.type==='carrot') { handleCarrotDraw(); }
  else if(card.type==='bond')   { handleBondDraw(); }
  else if(card.type==='fox')    { doFox('player'); }
}
function resolvePending(card) {
  G.drawn = card; G.pending = null; resolveDrawn(card);
}

function doPlayerBunny(color, variant) {
  G.player.bunnies[color]++;
  if(variant) G.player.variants[color].push(variant);
  addLog(`🐰 Drew a ${CM[color].name} Bunny! (${G.player.bunnies[color]}/4)`);
  G.drawn = G.drawn||{type:'bunny',color,variant};
  G.phase='auto';

  // 🔵 GA: bunny collected
  gaEvent('bunny_collected', {
    color,
    count: G.player.bunnies[color],
    game_number: _gameNumber
  });

  if(!checkWin('player')) { render(); setTimeout(endPlayerTurn,1500); }
}
function handleCarrotDraw() {
  sfxCarrotDrawn();
  // 🔵 GA: carrot drawn
  gaEvent('special_card_drawn', { card_type: 'carrot', game_number: _gameNumber });
  if(G.player.carrot) {
    addLog('🥕 Drew a Carrot! Already have one saved. Steal from AI now:');
    G.phase='carrot_target'; render();
  } else {
    const hasT = COLORS.some(c=>G.ai.bunnies[c]>0&&!G.ai.bonds[c]);
    if(!hasT) {
      G.player.carrot=true;
      addLog('🥕 Drew a Carrot — AI has nothing to steal! Saved automatically.');
      G.phase='auto'; render(); setTimeout(endPlayerTurn,1500);
    } else {
      G.phase='carrot_choice';
      addLog('🥕 Drew a Carrot! Use it now to steal from AI, or save for later?');
      render();
    }
  }
}
function handleBondDraw() {
  sfxBondDrawn();
  // 🔵 GA: bond drawn
  gaEvent('special_card_drawn', { card_type: 'bond', game_number: _gameNumber });
  const elig = eligibleBondGroups();
  if(elig.length===0) {
    if(G.player.bond<2) {
      G.player.bond++;
      discardCard(G.drawn); G.drawn=null;
      addLog(`💕 Drew a Bunny Bond — no groups ready yet. Saved! (${G.player.bond} saved)`);
    } else {
      discardCard(G.drawn); G.drawn=null;
      addLog('💕 Drew a Bunny Bond — no groups ready & already have 2 saved. Discarded.');
    }
    G.phase='auto'; render(); setTimeout(endPlayerTurn,1500);
  } else {
    G.phase='bond_choice';
    addLog(`💕 Drew a Bunny Bond! Use it now to protect a group, or save for later?`);
    render();
  }
}
function doFox(by) {
  sfxFox();
  const vic=by==='player'?'ai':'player';
  const vn=vic==='player'?'Your':"AI's";
  let wiped=[];
  COLORS.forEach(c=>{
    if(G[vic].bunnies[c]>0&&!G[vic].bonds[c]) {
      wiped.push(CM[c].name);
      G[vic].bunnies[c]=0;
      G[vic].variants[c]=[];
    }
  });
  discardCard({type:'fox'});
  if(wiped.length>0) addLog(`🦊 Fox pounced! ${vn} ${wiped.join(', ')} bunnies scattered!`);
  else addLog(`🦊 Fox pounced but all bunnies were Bonded — nothing lost!`);

  // 🔵 GA: fox played
  gaEvent('special_card_drawn', {
    card_type: 'fox',
    played_by: by,
    bunnies_wiped: wiped.length,
    game_number: _gameNumber
  });

  G.phase='auto'; render();
  if(by==='player') setTimeout(endPlayerTurn,2000);
}

function useSavedCarrot() { G.player.carrot=false; G.phase='sc_target'; addLog('🥕 Choose which AI color group to steal!'); render(); }
function skipSavedCarrot() { const pend=G.pending; G.pending=null; G.drawn=pend; afterCarrotCheck(pend); }
function selectScTarget(color) {
  const n=G.ai.bunnies[color];
  if(!n||G.ai.bonds[color]) return;
  G.ai.bunnies[color]=0; G.player.bunnies[color]+=n;
  const stolen=G.ai.variants[color].splice(0); stolen.forEach(v=>G.player.variants[color].push(v));
  discardCard({type:'carrot'}); sfxCarrotUsed();
  addLog(`🥕 Used saved Carrot! Stole ${n} ${CM[color].name} bunnies from AI!`);
  if(!checkWin('player')) { const pend=G.pending; G.pending=null; afterCarrotCheck(pend); }
}
function playerUseCarrot() { G.phase='carrot_target'; render(); }
function playerSaveCarrot() {
  G.player.carrot=true; discardCard(G.drawn); G.drawn=null;
  addLog('🥕 Carrot saved for later!');
  G.phase='auto'; render(); setTimeout(endPlayerTurn,1400);
}
function selectCarrotTarget(color) {
  const n=G.ai.bunnies[color];
  if(!n||G.ai.bonds[color]) return;
  G.ai.bunnies[color]=0; G.player.bunnies[color]+=n;
  const stolen=G.ai.variants[color].splice(0); stolen.forEach(v=>G.player.variants[color].push(v));
  G.player.carrot=false; discardCard({type:'carrot'}); sfxCarrotUsed();
  addLog(`🥕 Carrot used! Stole ${n} ${CM[color].name} bunnies from AI!`);
  if(!checkWin('player')) { G.phase='auto'; render(); setTimeout(endPlayerTurn,1500); }
}
function useSavedBond() { G.player.bond--; G.phase='sb_target'; addLog('💕 Choose which group to protect with your saved Bond!'); render(); }
function skipSavedBond() { const pend=G.pending; G.pending=null; G.drawn=pend; resolvePending(pend); }
function selectSbTarget(color) {
  if(G.player.bunnies[color]<2||G.player.bonds[color]) return;
  G.player.bonds[color]=true; sfxBondUsed();
  addLog(`💕 Saved Bond used! ${CM[color].name} bunnies are now protected!`);
  const pend=G.pending; G.pending=null; G.drawn=pend;
  if(pend) resolvePending(pend);
  else { G.phase='auto'; render(); setTimeout(endPlayerTurn,1400); }
}
function playerUseBondNow() { G.phase='bond_select'; render(); }
function playerSaveBond() {
  if(G.player.bond<2) { G.player.bond++; discardCard(G.drawn); G.drawn=null; addLog(`💕 Bond saved for later! (${G.player.bond} saved)`); }
  else { discardCard(G.drawn); G.drawn=null; addLog('💕 Already have 2 saved Bonds — this one was discarded.'); }
  G.phase='auto'; render(); setTimeout(endPlayerTurn,1400);
}
function selectBondColor(color) {
  if(G.player.bunnies[color]<2||G.player.bonds[color]) return;
  G.player.bonds[color]=true; discardCard(G.drawn); G.drawn=null; sfxBondUsed();
  addLog(`💕 Bunny Bond placed! ${CM[color].name} bunnies are protected!`);
  G.phase='auto'; render(); setTimeout(endPlayerTurn,1400);
}

function checkWin(who) {
  const won=COLORS.some(c=>G[who].bunnies[c]>=4);
  if(won) {
    G.winner=who; G.phase='win';
    stopBgMelody();
    if(who==='player') sfxWin();
    addLog(who==='player'?'🏆 YOU WIN! Bunny Warren declared!':'😢 AI wins! Better luck next time!');

    // 🔵 GA: game over — key conversion event
    gaEvent('game_complete', {
      outcome: who === 'player' ? 'player_win' : 'ai_win',
      player_turns: G._turnsPlayer,
      game_number: _gameNumber,
      winning_color: COLORS.find(c => G[who].bunnies[c] >= 4) || 'unknown'
    });

    render(); return true;
  }
  return false;
}

function endPlayerTurn() {
  if(G.phase==='win') return;
  G.drawn=null; G.turn='ai'; G.phase='ai'; render();
  setTimeout(aiTurn, 700);
}

function aiTurn() {
  if(G.phase==='win') return;
  const card=popCard(); G.drawn=card;
  addLog('🤖 AI draws...'); render();
  setTimeout(()=>{
    if(G.phase==='win') return;
    if(card.type==='animal') {
      discardCard(card); sfxAnimal();
      addLog(`🤖🐾 AI drew a ${card.name} — discarded.`);
      endAiTurn();
    } else if(card.type==='bunny') {
      const hasBondTarget=COLORS.some(c=>G.ai.bunnies[c]>=2&&!G.ai.bonds[c]);
      if(G.ai.bond>0 && hasBondTarget && Math.random()<.6) {
        const bt=bestBondTarget('ai');
        if(bt){G.ai.bonds[bt]=true; G.ai.bond--; addLog(`🤖💕 AI used a saved Bond on ${CM[bt].name}!`);}
      }
      G.ai.bunnies[card.color]++;
      if(card.variant) G.ai.variants[card.color].push(card.variant);
      addLog(`🤖🐰 AI drew a ${CM[card.color].name} Bunny! (${G.ai.bunnies[card.color]}/4)`);
      if(!checkWin('ai')) endAiTurn();
    } else if(card.type==='carrot') {
      if(G.ai.carrot) {
        const t=bestTarget('player');
        if(t&&G.player.bunnies[t]>0) {
          stealFrom('player',t); discardCard(card); sfxCarrotUsed();
          addLog(`🤖🥕 AI used new Carrot to steal your ${CM[t].name} bunnies!`);
          if(!checkWin('ai')) endAiTurn();
        } else { discardCard(card); endAiTurn(); }
      } else {
        const t=bestTarget('player');
        if(t&&G.player.bunnies[t]>=2&&Math.random()<.55) {
          stealFrom('player',t); discardCard(card); sfxCarrotUsed();
          addLog(`🤖🥕 AI used Carrot to steal your ${CM[t].name} bunnies!`);
          if(!checkWin('ai')) endAiTurn();
        } else { G.ai.carrot=true; addLog('🤖 AI saved a Carrot for later...'); endAiTurn(); }
      }
    } else if(card.type==='bond') {
      const t=bestBondTarget('ai');
      if(t) { G.ai.bonds[t]=true; discardCard(card); addLog(`🤖💕 AI Bonded its ${CM[t].name} bunnies!`); }
      else if(G.ai.bond<2) { G.ai.bond++; discardCard(card); addLog(`🤖 AI saved a Bond for later.`); }
      else { discardCard(card); addLog('🤖 AI drew Bunny Bond — nothing to protect. Discarded.'); }
      endAiTurn();
    } else if(card.type==='fox') {
      const bt=bestBondTarget('ai');
      if(G.ai.bond>0 && bt) { G.ai.bonds[bt]=true; G.ai.bond--; addLog(`🤖💕 AI used a saved Bond before unleashing the Fox!`); }
      G.drawn=card; doFox('ai');
      if(G.phase!=='win') setTimeout(endAiTurn,1800);
    }
    render();
  },900);
}

function stealFrom(vic, color) {
  const n=G[vic].bunnies[color];
  const src=vic==='player'?G.player:G.ai;
  const dst=vic==='player'?G.ai:G.player;
  dst.bunnies[color]+=n; src.bunnies[color]=0; src.bonds[color]=false;
  const stolen=src.variants[color].splice(0); stolen.forEach(v=>dst.variants[color].push(v));
}
function bestTarget(opp) {
  let best=null,bc=0;
  COLORS.forEach(c=>{ if(!G[opp].bonds[c]&&G[opp].bunnies[c]>bc){bc=G[opp].bunnies[c];best=c;} });
  return bc>0?best:null;
}
function bestBondTarget(who) {
  let best=null,bc=1;
  COLORS.forEach(c=>{ if(G[who].bunnies[c]>=2&&!G[who].bonds[c]&&G[who].bunnies[c]>bc){bc=G[who].bunnies[c];best=c;} });
  return best;
}
function endAiTurn() {
  if(G.phase==='win') return;
  G.drawn=null; G.turn='player'; G.phase='waiting'; render();
}

// ── Warren HTML ───────────────────────────────────
function warrenHTML(p, isAi) {
  const cardCls    = isAi ? 'ws-card--ai'      : 'ws-card';
  const emptyCls   = isAi ? 'ws-empty--ai'     : 'ws-empty';
  const bondSlotCls= isAi ? 'ws-bond-slot--ai' : 'ws-bond-slot';
  const dividerCls = isAi ? 'warren-bond-divider--ai' : 'warren-bond-divider';
  const radius     = isAi ? '4' : '5';

  function colorBlock(c) {
    const n=p.bunnies[c], bd=p.bonds[c], m=CM[c], isThree=(n===3);
    const rowBg = bd ? `background:${m.hex}20;border-color:rgba(255,215,0,.6)` : `background:${m.hex}18`;
    const rowClasses = ['warren-row', bd?'bonded':'', isThree?'three-glow':''].filter(Boolean).join(' ');
    let slots='';
    for(let i=1;i<=4;i++) {
      if(i<=n) {
        const vn=(p.variants[c][i-1])||i;
        slots+=`<img src="images/${m.prefix}${vn}.png" class="${cardCls}" alt="${m.name} Bunny" onerror="this.style.background='${m.hex}44';this.style.borderRadius='${radius}px'">`;
      } else {
        slots+=`<div class="${emptyCls}" style="background:${m.hex}28;border-radius:${radius}px;"></div>`;
      }
    }
    const shield = bd ? `<div class="row-shield">🛡️</div>` : '';
    const hint   = isThree ? `<span class="one-more">✨ ONE MORE!</span>` : '';
    const labelHTML = bd
      ? `<span class="warren-row-label" style="color:${m.hex}">${m.name} <span class="bonded-label-tag">Bonded 🛡️</span></span>`
      : `<span class="warren-row-label" style="color:${m.hex}">${m.name}</span>`;
    const bondSlot = bd ? `` : `<div class="${bondSlotCls}" style="background:rgba(255,255,255,.06);border:1px dashed rgba(255,255,255,.12);border-radius:${radius}px;opacity:.5;"></div>`;
    return `<div class="${rowClasses}" style="${rowBg}" title="${m.name}: ${n}/4${bd?' — Bonded 🛡️':''}${isThree?' — ONE MORE TO WIN!':''}">
      ${labelHTML}
      <div class="warren-slots">${slots}<div class="${dividerCls}"></div>${bondSlot}</div>
      ${hint}
    </div>`;
  }

  return `<div class="warren-pair">${colorBlock('red')}${colorBlock('blue')}</div>
          <div class="warren-pair">${colorBlock('green')}${colorBlock('orange')}</div>`;
}

// ── Player warren: 4 vertical columns ────────────
function playerWarrenHTML(p) {
  return `<div class="warren-cols">` +
    COLORS.map(c => {
      const n=p.bunnies[c], bd=p.bonds[c], m=CM[c], isThree=(n===3);
      const colBg = bd ? `background:${m.hex}20;border-color:rgba(255,215,0,.6)` : `background:${m.hex}18`;
      const colCls = ['warren-col', bd?'bonded':'', isThree?'three-glow':''].filter(Boolean).join(' ');
      const bondSlot = bd
        ? `<div class="wc-bond-slot bonded-slot"><span>Bunny<br>Bonded 🛡️</span></div>`
        : `<div class="wc-bond-slot empty-slot"><span>Bond<br>Slot</span></div>`;
      let cards='';
      for(let i=1;i<=4;i++) {
        if(i<=n) {
          const vn=(p.variants[c][i-1])||i;
          cards+=`<img src="images/${m.prefix}${vn}.png" class="wc-card" alt="${m.name} Bunny" onerror="this.style.background='${m.hex}44';this.style.borderRadius='5px'">`;
        } else {
          cards+=`<div class="wc-empty" style="background:${m.hex}28;border-radius:5px;"></div>`;
        }
      }
      const oneMore = isThree ? `<span class="wc-one-more">✨ ONE MORE!</span>` : '';
      return `<div class="${colCls}" style="${colBg}" title="${m.name}: ${n}/4${bd?' — Bonded':''}${isThree?' — ONE MORE!':''}">
        <span class="warren-col-label" style="color:${m.hex}">${m.name}</span>
        ${bondSlot}
        <div class="wc-divider"></div>
        <div class="wc-bunny-stack">${cards}</div>
        ${oneMore}
      </div>`;
    }).join('') + `</div>`;
}

// ── Drawn card ────────────────────────────────────
function drawnCardHTML(card) {
  if(!card) {
    const canDraw = G.phase==='waiting' && G.turn==='player';
    if(canDraw) return `<div class="drawn-card-empty" id="draw-empty-slot" onclick="flashAndDraw(this)">👆 Tap deck<br>or here to draw</div>`;
    return `<div class="drawn-card-empty inactive">Draw<br>a card</div>`;
  }
  if(card.type==='animal') {
    return `<div class="drawn-card-img-wrap" style="background:#f5f5f0">
      <img src="images/${card.img}" alt="${card.name}" style="width:100%;display:block;padding:.3rem;box-sizing:border-box;">
      <div class="drawn-card-label-bar" style="background:#f5f5f0;color:#555">${card.name}</div>
    </div>`;
  }
  let imgSrc,label,bgColor;
  if(card.type==='bunny')  { const m=CM[card.color]; imgSrc=`images/${m.prefix}${card.variant||1}.png`; label=`${m.name} Bunny`; bgColor=m.light; }
  if(card.type==='carrot') { imgSrc='images/carrotcard.png';    label='Carrot';     bgColor='#fff8ee'; }
  if(card.type==='bond')   { imgSrc='images/bunnybondcard.png'; label='Bunny Bond'; bgColor='#fff0f8'; }
  if(card.type==='fox')    { imgSrc='images/foxcard.png';       label='Fox!';       bgColor='#fff4ee'; }
  if(imgSrc) {
    return `<div class="drawn-card-img-wrap" style="background:${bgColor}">
      <img src="${imgSrc}" alt="${label}">
      <div class="drawn-card-label-bar" style="background:${bgColor};color:#444">${label}</div>
    </div>`;
  }
  return `<div class="drawn-card-empty">?</div>`;
}

// ── Inventory badges ──────────────────────────────
function invBadgesHTML(carrot, bond) {
  const carrotBadge = carrot
    ? `<span class="inv-badge inv-badge--carrot" title="Saved Carrot"><img src="images/carrotcard.png" alt="carrot"> ×1</span>`
    : `<span class="inv-badge inv-badge--empty">🥕 ×0</span>`;
  const bondBadge = bond>0
    ? `<span class="inv-badge inv-badge--bond" title="${bond} saved Bond(s)"><img src="images/bunnybondcard.png" alt="bond"> ×${bond}</span>`
    : `<span class="inv-badge inv-badge--empty">💕 ×0</span>`;
  return `<span class="inv-badges">${carrotBadge}${bondBadge}</span>`;
}

// ── Action buttons ────────────────────────────────
function actionsHTML() {
  if(G.winner) return `<button class="game-btn go" onclick="startGame()">🔄 Play Again</button>`;
  const ph=G.phase;
  if(ph==='waiting'&&G.turn==='player') return ``;
  if(ph==='ai')   return `<div class="ai-thinking-txt">🤖 AI is thinking…</div>`;
  if(ph==='auto') return `<button class="game-btn" disabled>⏳</button>`;
  if(ph==='sc_prompt') return `
    <button class="game-btn go"  onclick="useSavedCarrot()">🥕 Use Saved Carrot!</button>
    <button class="game-btn sec" onclick="skipSavedCarrot()">Skip → Resolve Card</button>`;
  if(ph==='sc_target')    return colorBtnsHTML('selectScTarget','player','Steal which AI group?');
  if(ph==='carrot_choice') return `
    <button class="game-btn go"  onclick="playerUseCarrot()">🥕 Use Now → Steal!</button>
    <button class="game-btn sec" onclick="playerSaveCarrot()">💾 Save for Later</button>`;
  if(ph==='carrot_target') return colorBtnsHTML('selectCarrotTarget','player','Steal which AI group?');
  if(ph==='sb_prompt') return `
    <button class="game-btn go"  onclick="useSavedBond()">💕 Use Saved Bond!</button>
    <button class="game-btn sec" onclick="skipSavedBond()">Skip → Resolve Card</button>`;
  if(ph==='sb_target') return colorBtnsHTML('selectSbTarget','me','Protect which group?');
  if(ph==='bond_choice') return `
    <button class="game-btn go"  onclick="playerUseBondNow()">💕 Use Now → Protect!</button>
    <button class="game-btn sec" onclick="playerSaveBond()">💾 Save for Later</button>`;
  if(ph==='bond_select') return colorBtnsHTML('selectBondColor','me','Protect which group?');
  return `<button class="game-btn" disabled>⏳</button>`;
}

function colorBtnsHTML(fn, perspective, label) {
  const source=perspective==='me'?G.player:G.ai;
  const btns=COLORS.map(c=>{
    const n=source.bunnies[c], bd=source.bonds[c];
    let blocked,tip;
    if(perspective==='me'){
      blocked=n<2||bd;
      tip=bd?'Already bonded':n<2?`Need 2+ (have ${n})`:`Protect ${n} ${CM[c].name}`;
    } else {
      blocked=n===0||bd;
      tip=bd?"Bonded — can't steal":n===0?'Empty':`Steal ${n} ${CM[c].name}`;
    }
    return `<button class="color-btn" style="background:${CM[c].hex}" onclick="${fn}('${c}')" ${blocked?'disabled':''} title="${tip}">${bd?'🛡️':n>0?n:'—'}</button>`;
  }).join('');
  return `<div class="cpick-label">${label}</div><div class="color-picker">${btns}</div>`;
}

// ── Render ────────────────────────────────────────
function render() {
  if(!G) return;
  const root=document.getElementById('game-root');
  if(!root) return;
  const winBanner=G.winner?`
    <div class="win-banner">
      <h3>${G.winner==='player'?'🏆 You Win!':'😢 AI Wins!'}</h3>
      <p>${G.winner==='player'?'Congratulations! You built a Bunny Warren!':'The AI outsmarted you this time. Try again!'}</p>
      <button class="game-btn go" onclick="startGame()" style="max-width:200px;margin:0 auto;">🔄 Play Again</button>
    </div>`:'';
  root.innerHTML=`
    ${winBanner}
    <div class="game-area-label">🤖 AI's Warren ${invBadgesHTML(G.ai.carrot, G.ai.bond)}</div>
    <div class="warren-area">${warrenHTML(G.ai, true)}</div>
    <div class="game-middle">
      <div class="deck-pile">
        <img src="images/Back.png" alt="Draw"
             class="deck-card-img ${G.phase!=='waiting'||G.turn!=='player'?'disabled':''}"
             onclick="deckTap()" title="Draw a card">
        <div class="deck-count">${G.deck.length} left</div>
      </div>
      <div class="drawn-card-area">
        ${drawnCardHTML(G.drawn)}
        <div class="game-message">${G.log[0]||''}</div>
      </div>
      <div class="actions-area">${actionsHTML()}</div>
    </div>
    <div class="game-area-label">🐰 Your Warren ${invBadgesHTML(G.player.carrot, G.player.bond)}</div>
    <div class="warren-area warren-area--player">${playerWarrenHTML(G.player)}</div>
    <div class="game-log">
      ${G.log.map((l,i)=>`<div class="log-entry" style="opacity:${Math.max(.4,1-i*.15)}">${l}</div>`).join('')}
    </div>`;
}

window.addEventListener('DOMContentLoaded', startGame);
</script>
</body>
</html>
